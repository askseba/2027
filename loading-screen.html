<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بصمتك العطرية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #fcf9f2;
  --gold: #c9a96e;
  --gold-light: #e8d5b0;
  --deep: #2c1f14;
  --muted: #8a7361;
}

body {
  background: var(--cream);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Tajawal', sans-serif;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.scene {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 48px;
  z-index: 1;
}

.orb-wrapper {
  position: relative;
  width: 180px;
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid var(--gold);
  opacity: 0;
  animation: ringExpand 3s ease-out infinite;
}
.ring:nth-child(1) { width: 100%; height: 100%; animation-delay: 0s; }
.ring:nth-child(2) { width: 100%; height: 100%; animation-delay: 1s; }
.ring:nth-child(3) { width: 100%; height: 100%; animation-delay: 2s; }

@keyframes ringExpand {
  0%   { transform: scale(1);   opacity: 0.6; }
  100% { transform: scale(2.2); opacity: 0; }
}

.orb {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #f0dfc0 0%, #d4a96a 40%, #a87840 75%, #7a5228 100%);
  box-shadow:
    0 0 40px rgba(201, 169, 110, 0.4),
    0 0 80px rgba(201, 169, 110, 0.15),
    inset 0 -10px 30px rgba(0,0,0,0.15);
  animation: breathe 3.5s ease-in-out infinite;
  position: relative;
  z-index: 2;
}

.orb::after {
  content: '';
  position: absolute;
  top: 18%; left: 22%;
  width: 28%; height: 20%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.55) 0%, transparent 100%);
  border-radius: 50%;
  transform: rotate(-30deg);
}

@keyframes breathe {
  0%, 100% {
    transform: scale(1);
    box-shadow: 0 0 40px rgba(201,169,110,0.4), 0 0 80px rgba(201,169,110,0.15), inset 0 -10px 30px rgba(0,0,0,0.15);
  }
  50% {
    transform: scale(1.12);
    box-shadow: 0 0 60px rgba(201,169,110,0.6), 0 0 120px rgba(201,169,110,0.25), inset 0 -10px 30px rgba(0,0,0,0.15);
  }
}

.particles {
  position: absolute;
  inset: -40px;
  pointer-events: none;
}
.particle {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0;
  animation: floatUp var(--dur) ease-in infinite;
  animation-delay: var(--delay);
  left: var(--x);
  bottom: 30%;
}

@keyframes floatUp {
  0%   { opacity: 0;   transform: translateY(0) scale(1); }
  20%  { opacity: 0.7; }
  100% { opacity: 0;   transform: translateY(-90px) scale(0.3); }
}

.text-area {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.label {
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--gold);
  font-weight: 500;
  opacity: 0.9;
}

/* حاوية النصوص المتدورة */
.message-wrapper {
  position: relative;
  height: 32px;
  width: 260px;
  overflow: hidden;
}

.message {
  position: absolute;
  width: 100%;
  font-size: 18px;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: 0.02em;
  text-align: center;
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  pointer-events: none;
}

.message.visible {
  opacity: 1;
  transform: translateY(0);
}

.message.exit {
  opacity: 0;
  transform: translateY(-14px);
}

.progress-track {
  width: 140px;
  height: 2px;
  background: rgba(201,169,110,0.15);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 8px;
}
.progress-fill {
  height: 100%;
  width: 40%;
  border-radius: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: sweep 2s ease-in-out infinite;
}

@keyframes sweep {
  0%   { transform: translateX(-150%); }
  100% { transform: translateX(350%); }
}

/* نقاط المؤشر */
.dots {
  display: flex;
  gap: 6px;
  margin-top: 4px;
}
.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(201,169,110,0.3);
  transition: background 0.4s ease, transform 0.4s ease;
}
.dot.active {
  background: var(--gold);
  transform: scale(1.3);
}
</style>
</head>
<body>

<div class="scene">
  <div class="orb-wrapper">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="orb"></div>
    <div class="particles" id="particles"></div>
  </div>

  <div class="text-area">
    <div class="label">✦ تحليل بصمتك ✦</div>

    <div class="message-wrapper" id="msgWrapper"></div>

    <div class="dots" id="dots"></div>

    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
  </div>
</div>

<script>
  // جزيئات عائمة
  const container = document.getElementById('particles');
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.setProperty('--x', `${20 + Math.random() * 60}%`);
    p.style.setProperty('--dur', `${2 + Math.random() * 2}s`);
    p.style.setProperty('--delay', `${Math.random() * 3}s`);
    container.appendChild(p);
  }

  // الرسائل المتدورة
  const messages = [
    'نبحث في آلاف العطور',
    'نحلل ذوقك العطري',
    'نرسم بصمتك الفريدة',
    'نختار ما يليق بك',
    'لحظات وتكتمل بصمتك…',
  ];

  const wrapper = document.getElementById('msgWrapper');
  const dotsEl  = document.getElementById('dots');

  // إنشاء عناصر النص
  const spans = messages.map((txt, i) => {
    const s = document.createElement('div');
    s.className = 'message';
    s.textContent = txt;
    wrapper.appendChild(s);
    return s;
  });

  // إنشاء النقاط
  messages.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(d);
  });

  let current = 0;

  function showNext() {
    const prev = current;
    current = (current + 1) % messages.length;

    // أخرج القديم
    spans[prev].classList.remove('visible');
    spans[prev].classList.add('exit');
    dotsEl.children[prev].classList.remove('active');

    setTimeout(() => {
      spans[prev].classList.remove('exit');
    }, 600);

    // أدخل الجديد
    setTimeout(() => {
      spans[current].classList.add('visible');
      dotsEl.children[current].classList.add('active');
    }, 300);
  }

  // ابدأ بإظهار أول رسالة
  setTimeout(() => spans[0].classList.add('visible'), 200);

  // دوران كل 2.4 ثانية
  setInterval(showNext, 2400);
</script>

</body>
</html>
